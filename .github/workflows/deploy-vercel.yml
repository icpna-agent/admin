name: Deploy Angular to Vercel

on:
  # Se ejecuta automáticamente al hacer push en la rama principal (main)
  push:
    branches:
      - main

  # Permite ejecutar el workflow de manera manual desde la pestaña de Actions
  workflow_dispatch:

# Permisos mínimos requeridos para leer el repositorio
permissions:
  contents: read

# Evita ejecuciones duplicadas de builds en la misma rama cancelando los previos
concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Variables de entorno requeridas por Vercel CLI
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # Descarga el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configura el entorno de Node.js v22 habilitando la caché para npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Instala las dependencias de manera limpia basadas en package-lock.json
      - name: Install dependencies
        run: npm ci

      # Instala la interfaz de línea de comandos (CLI) de Vercel de forma global
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Descarga las configuraciones del proyecto asociadas en el dashboard de Vercel
      - name: Pull Vercel configuration
        run: >
          vercel pull
          --yes
          --environment=production
          --token=${{ secrets.VERCEL_TOKEN }}

      # Compila la aplicación usando Vercel CLI en el entorno local de GitHub Actions
      - name: Build application
        run: >
          vercel build
          --prod
          --token=${{ secrets.VERCEL_TOKEN }}

      # Sube y publica el build precompilado al entorno de producción en Vercel
      - name: Deploy to production
        run: >
          vercel deploy
          --prebuilt
          --prod
          --token=${{ secrets.VERCEL_TOKEN }}
