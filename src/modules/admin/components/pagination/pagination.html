<div
  class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 px-4 py-2 bg-text/5 border-t border-text/10"
>
  <!-- Info de paginación -->
  <div class="flex items-center justify-between sm:justify-start gap-4 order-2 sm:order-1">
    <p class="text-xs text-text/60 font-inter-regular whitespace-nowrap">
      Mostrando <span class="font-inter-semibold">{{ getStartItem() }}-{{ getEndItem() }}</span> de
      <span class="font-inter-semibold">{{ meta()?.total || 0 }}</span>
    </p>

    <!-- Selector de tamaño de página -->
    <div class="relative">
      <select
        [value]="pageSize()"
        (change)="onPageSizeChange($event)"
        class="appearance-none rounded border border-text/10 bg-background py-1 pl-2 pr-7 text-xs text-text font-inter-medium outline-none focus:border-secondary"
      >
        <option [value]="10">10</option>
        <option [value]="20">20</option>
        <option [value]="30">30</option>
        <option [value]="50">50</option>
      </select>
      <i class="fas fa-chevron-down pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-[0.6rem] text-text/40"></i>
    </div>
  </div>

  <!-- Controles de paginación -->
  <div class="flex items-center justify-center sm:justify-end gap-1 order-1 sm:order-2">
    <!-- Botón Anterior -->
    <button
      [disabled]="!meta()?.hasPreviousPage"
      (click)="goToPage(currentPage() - 1)"
      class="px-2 py-1 text-xs rounded text-text/60 hover:text-text hover:bg-text/5 disabled:opacity-50 disabled:cursor-not-allowed"
      title="Página anterior"
    >
      <i class="fas fa-angle-double-left"></i>
    </button>

    <!-- Páginas -->
    <div class="flex items-center gap-1">
      @for (page of getPageNumbers(); track page) { @if (page === '...') {
      <span class="px-1 py-1 text-xs text-text/40">...</span>
      } @else {
      <button
        (click)="goToPage(+page)"
        [class]="
          currentPage() === +page
            ? 'px-2.5 py-1 text-xs rounded bg-secondary text-background font-inter-semibold'
            : 'px-2.5 py-1 text-xs rounded text-text/60 hover:text-text hover:bg-text/5 font-inter-medium'
        "
      >
        {{ page }}
      </button>
      } }
    </div>

    <!-- Botón Siguiente -->
    <button
      [disabled]="!meta()?.hasNextPage"
      (click)="goToPage(currentPage() + 1)"
      class="px-2 py-1 text-xs rounded text-text/60 hover:text-text hover:bg-text/5 disabled:opacity-50 disabled:cursor-not-allowed"
      title="Página siguiente"
    >
      <i class="fas fa-angle-double-right"></i>
    </button>
  </div>
</div>
