<div
  class="h-20 px-4 sm:px-6 md:px-8 flex items-center justify-between bg-surface gap-2 sm:gap-4 border-b border-border shadow-[0_1px_2px_rgba(15,23,42,0.04)]"
>
  <div class="flex items-center gap-4">
    <div class="md:hidden flex items-center gap-3 mr-2">
      <img src="/avif/icono.avif" alt="Admin Icon" class="h-9 w-auto" />
      <span class="text-text text-2xl font-inter-bold tracking-tight">Admin</span>
    </div>

    <div
      (click)="onToggleSidebar()"
      class="md:hidden h-10 w-10 rounded-full flex items-center justify-center text-muted hover:text-text hover:bg-background-100 cursor-pointer"
      title="Colapsar/Expandir menú"
    >
      <i class="fas fa-bars text-xl"></i>
    </div>

    <div
      (click)="onToggleCollapse()"
      class="hidden md:flex h-10 w-10 rounded-full items-center justify-center text-muted hover:text-text hover:bg-background-100 cursor-pointer"
      title="Colapsar/Expandir menú"
    >
      <i class="fas fa-bars text-xl"></i>
    </div>
  </div>
  <div class="flex items-center gap-2 sm:gap-4">
    <div class="relative flex items-center gap-3 pl-2 sm:pl-5 sm:border-l border-border select-none">
      <div
        (click)="goToProfile()"
        class="text-right hidden sm:block cursor-pointer hover:text-secondary transition-colors"
      >
        <div class="text-sm font-inter-semibold text-text capitalize whitespace-nowrap">
          Mi perfil
        </div>
      </div>

      <div
        (click)="onToggleDropdown()"
        class="w-10 h-10 overflow-hidden rounded-full bg-background/40 flex items-center justify-center text-text font-inter-bold border border-border shadow-sm cursor-pointer hover:bg-background/60 transition-colors"
      >
        @if (profilePicture() && !photoError()) {
          <img [src]="profilePicture()" alt="Foto de perfil" (error)="onPhotoError()" class="h-full w-full object-cover" />
        } @else {
          <div class="h-full w-full flex items-center justify-center bg-primary/10 text-primary-700 font-inter-bold text-sm tracking-wider">
            {{ userInitials() }}
          </div>
        }
      </div>

      @if (isDropdownOpen()) {
      <div class="fixed inset-0 z-40" (click)="onToggleDropdown()"></div>
      <div
        class="absolute right-0 top-full mt-2 w-52 bg-surface rounded-2xl shadow-xl border border-border overflow-hidden z-50 flex flex-col py-1 animate-in fade-in slide-in-from-top-2 duration-200"
      >
        <button
          (click)="toggleTheme()"
          class="w-full px-4 py-2 text-left text-xs font-inter-medium text-text hover:bg-background-50 flex items-center gap-3"
        >
          @if (themeService.theme() === 'dark') {
          <div class="w-7 h-7 rounded-lg flex items-center justify-center text-muted">
            <i class="fas fa-sun text-xs"></i>
          </div>
          <span class="leading-tight">Modo Claro</span>
          } @else {
          <div class="w-7 h-7 rounded-lg flex items-center justify-center text-muted">
            <i class="fas fa-moon text-xs"></i>
          </div>
          <span class="leading-tight">Modo Oscuro</span>
          }
        </button>

        <button
          (click)="logout()"
          class="w-full px-4 py-2 text-left text-xs font-inter-medium text-danger hover:bg-danger/5 flex items-center gap-3 border-t border-border"
        >
          <div class="w-7 h-7 rounded-lg flex items-center justify-center text-danger">
            <i class="fas fa-sign-out-alt text-xs"></i>
          </div>
          <span class="leading-tight">Cerrar Sesion</span>
        </button>
      </div>
      }
    </div>
  </div>
</div>
