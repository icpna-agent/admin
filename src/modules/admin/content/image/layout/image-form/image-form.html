<form [formGroup]="form" class="p-6 space-y-4 bg-background/50 rounded-xl backdrop-blur-sm">
  <!-- Core Information Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="md:col-span-2">
      <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">URL de la Imagen <span class="text-danger">*</span></label>
      <input
        type="text"
        formControlName="url"
        class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
        placeholder="Ej: https://example.com/images/book-7-page-2.png"
      />
      @if (form.get('url')?.touched && form.get('url')?.invalid) {
        <span class="text-[10px] text-danger mt-1 font-inter-medium block">La URL de la imagen es requerida.</span>
      }
    </div>

    <div>
      <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">Página del Libro <span class="text-danger">*</span></label>
      <input
        type="number"
        formControlName="bookPage"
        class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
        placeholder="Ej: 2"
        min="1"
      />
      @if (form.get('bookPage')?.touched && form.get('bookPage')?.invalid) {
        <span class="text-[10px] text-danger mt-1 font-inter-medium block">Página física válida requerida (mín. 1).</span>
      }
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div>
      <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">ID Meta Media</label>
      <input
        type="number"
        formControlName="metaMediaId"
        class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
        placeholder="Ej: 321"
        min="1"
      />
    </div>
  </div>

  <!-- Image Preview Widget -->
  @if (form.get('url')?.value && form.get('url')?.valid) {
    <div class="p-4 bg-secondary/5 border border-secondary/10 rounded-xl space-y-3 animate-fade-in flex flex-col items-center">
      <label class="block text-[10px] font-inter-bold text-secondary uppercase tracking-wider self-start">Previsualización de Imagen</label>
      <div class="relative max-w-xs overflow-hidden rounded-lg border border-text/10 bg-text/5">
        <img [src]="form.get('url')?.value" alt="Image preview" class="max-h-48 object-contain transition-all hover:scale-105" />
      </div>
    </div>
  }
</form>
