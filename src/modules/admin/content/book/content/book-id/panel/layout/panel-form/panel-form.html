<form [formGroup]="form" class="p-6 space-y-4">
  <!-- Core Information Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="md:col-span-2">
      <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">Título del Panel <span class="text-danger">*</span></label>
      <input
        type="text"
        formControlName="title"
        class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
        placeholder="Ej: Quantifiers"
      />
      @if (form.get('title')?.touched && form.get('title')?.invalid) {
        <span class="text-[10px] text-danger mt-1 font-inter-medium block">El título es requerido.</span>
      }
    </div>

    <div>
      <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">Página del Libro <span class="text-danger">*</span></label>
      <input
        type="number"
        formControlName="bookPage"
        class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
        placeholder="Ej: 5"
        min="1"
      />
      @if (form.get('bookPage')?.touched && form.get('bookPage')?.invalid) {
        <span class="text-[10px] text-danger mt-1 font-inter-medium block">Página física válida requerida (mín. 1).</span>
      }
    </div>
  </div>

  <!-- Theme & SubTheme Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">Tema</label>
      <input
        type="text"
        formControlName="theme"
        class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
        placeholder="Ej: Grammar"
      />
    </div>

    <div>
      <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">Sub-tema</label>
      <input
        type="text"
        formControlName="subTheme"
        class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
        placeholder="Ej: Large and small quantity"
      />
    </div>
  </div>

  <!-- Instruction Field -->
  <div>
    <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">Instrucción</label>
    <input
      type="text"
      formControlName="instruction"
      class="w-full px-3 py-2 text-sm bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
      placeholder="Ej: Complete the grammar panel with a few, a little, many and much."
    />
  </div>

  <hr class="border-text/10" />

  <!-- Complex content text editor -->
  <div>
    <label class="block text-xs font-inter-bold text-text/80 uppercase tracking-wider mb-2">Contenido del Panel</label>
    <textarea
      formControlName="content"
      rows="6"
      class="w-full px-3 py-2 text-xs bg-text/5 border border-text/10 focus:border-secondary rounded-lg text-text font-inter-regular outline-none transition-all focus:ring-1 focus:ring-secondary/20"
      placeholder="Ej: Escribe aquí el contenido o texto detallado del panel..."
    ></textarea>
  </div>
</form>
