<div class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mt-4 lg:mt-0">
    <div>
      <h1 class="text-2xl font-anton text-text lowercase">editar usuario</h1>
      <p class="text-sm text-text/60 font-inter-regular mt-1">Actualiza la información del usuario del sistema.</p>
    </div>
    <button
      (click)="alCancelar()"
      class="flex items-center gap-2 px-4 py-2 bg-background border border-text/10 text-text rounded-lg text-sm font-inter-medium hover:bg-text/5 transition-all"
    >
      <i class="fas fa-arrow-left text-xs"></i><span>Volver</span>
    </button>
  </div>

  <div class="bg-surface border border-text/10 rounded-xl shadow-sm">
    @if (cargando()) {
      <div class="flex items-center justify-center py-12"><i class="fas fa-spinner fa-spin text-3xl text-secondary"></i></div>
    } @else if (datos()) {
      <app-user-form
        [datos]="datos()"
        [modoEdicion]="true"
        (alEnviarFormulario)="guardarCambios($event)"
      />
      <div class="flex justify-end gap-3 p-6 border-t border-text/10">
        <button (click)="alCancelar()" class="px-4 py-2 text-text/60 hover:text-text hover:bg-text/5 rounded-lg transition-all text-sm font-inter-medium">Cancelar</button>
        <button (click)="formularioComponente()?.enviarFormulario()" class="px-6 py-2 bg-secondary text-background rounded-lg text-sm font-inter-semibold hover:bg-secondary/90 transition-all shadow-sm">Guardar</button>
      </div>
    }
  </div>
</div>
