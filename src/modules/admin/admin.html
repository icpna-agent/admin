<div class="flex h-screen w-full bg-surface text-text overflow-hidden font-inter-regular">
  <app-sidebar
    class="shrink-0 md:flex md:flex-col w-auto z-20"
    [isOpen]="sidebarOpen()"
    [isCollapsed]="sidebarCollapsed()"
    (close)="closeSidebar()"
  />

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <app-navbar
      class="shrink-0 block h-auto z-10"
      (toggleSidebar)="toggleSidebar()"
      (toggleCollapse)="toggleCollapse()"
    />
    <main class="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8 bg-background/40 relative scroll-smooth">
      <div class="max-w-7xl mx-auto w-full">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
