<div class="min-h-screen flex items-center justify-center bg-background p-4 font-inter-regular text-text">
  <div class="w-full max-w-md bg-surface rounded-2xl shadow-lg border border-text/10 overflow-hidden">
    <div class="pt-12 pb-4 text-center">
      <img src="/avif/logo_completo.avif" alt="Admin" class="mx-auto h-12 w-auto" />
      <p class="text-sm text-text/50 font-inter-medium">Panel de administracion de libros</p>
    </div>

    <div class="p-10">
      <form (ngSubmit)="onLogin()" class="space-y-5">
        <div class="space-y-2">
          <label for="email" class="mb-2 block text-sm font-inter-semibold text-text/60">Email</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-text/40"></i>
            <input
              type="email"
              id="email"
              name="email"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              required
              class="block w-full pl-10 pr-3 py-2.5 border border-text/20 rounded-lg focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none bg-surface text-text placeholder:text-text-400"
              placeholder="admin@icpna.studio"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label for="password" class="mb-2 block text-sm font-inter-semibold text-text/60">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-text/40"></i>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              name="password"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              required
              class="block w-full pl-10 pr-10 py-2.5 border border-text/20 rounded-lg focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none bg-surface text-text placeholder:text-text-400"
              placeholder="123456"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-text/40 hover:text-secondary"
            >
              <i [class]="showPassword() ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full flex justify-center py-3 px-4 rounded-lg text-sm font-inter-bold text-background bg-secondary hover:bg-secondary/90 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (loading()) {
          <i class="fas fa-circle-notch fa-spin mr-2"></i> Ingresando... } @else { Ingresar }
        </button>
      </form>

      <p class="mt-6 text-center text-xs text-text/50">Acceso restringido para administradores.</p>
    </div>
  </div>

</div>
